name: Skill proposal
description: Propose a useful Hermes skill for Vasiliy to consider publishing or installing.
title: "Skill proposal: <name>"
labels: [skill-proposal]
body:
  - type: input
    id: name
    attributes:
      label: Skill name
      placeholder: ui-ux-pro-max
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this is useful
      description: What recurring task does it improve?
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: Trigger conditions
      description: When should Hermes load/use this skill?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source or inspiration
      description: Link or notes. Include license if relevant.
  - type: textarea
    id: safety
    attributes:
      label: Safety/privacy/licensing notes
      description: Any public-sharing concerns?
